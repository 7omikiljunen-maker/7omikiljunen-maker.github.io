<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>YeastiBoi — Privacy Policy</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brown:       #8B5E3C;
    --brown-dark:  #5C3A1E;
    --brown-light: #C4834A;
    --cream:       #FFF8F0;
    --crust:       #FFF3E0;
    --text:        #3E2000;
    --text-soft:   #7A5A3A;
  }

  body {
    font-family: 'Segoe UI', Georgia, sans-serif;
    background: var(--cream);
    color: var(--text);
    line-height: 1.75;
  }

  /* ── LANG TOGGLE ── */
  .lang-bar {
    background: var(--brown-dark);
    text-align: right;
    padding: 8px 24px;
  }
  .lang-bar button {
    background: none;
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    padding: 4px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    margin-left: 6px;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .lang-bar button.active { opacity: 1; font-weight: 600; }

  /* ── HEADER ── */
  .head {
    background: linear-gradient(160deg, var(--brown) 0%, var(--brown-dark) 100%);
    color: #fff;
    text-align: center;
    padding: 48px 24px 56px;
  }
  .head h1 { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
  .head p { opacity: 0.8; margin-top: 8px; font-size: 15px; }

  .wave { display: block; width: 100%; height: 50px; margin-top: -1px; }

  /* ── CONTENT ── */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 8px 24px 56px;
  }
  main h2 {
    font-size: 22px;
    color: var(--brown);
    margin: 36px 0 12px;
  }
  main p { font-size: 16px; margin-bottom: 12px; }
  main ul { margin: 0 0 12px 22px; }
  main li { font-size: 16px; margin-bottom: 6px; }
  .lead { font-size: 17px; }
  a { color: var(--brown); }

  footer {
    background: var(--brown-dark);
    color: #fff;
    text-align: center;
    padding: 28px 24px;
    font-size: 14px;
  }
  footer a { color: #fff; }
  footer p { margin-bottom: 6px; opacity: 0.85; }
</style>
</head>
<body>

<!-- Language bar -->
<div class="lang-bar">
  <button class="active" onclick="setLang('en')">EN</button>
  <button onclick="setLang('fi')">FI</button>
</div>

<!-- Header -->
<div class="head">
  <h1 class="t" data-en="Privacy Policy" data-fi="Tietosuojaseloste"></h1>
  <p class="t" data-en="YeastiBoi · Last updated 17 June 2026" data-fi="YeastiBoi · Päivitetty 17.6.2026"></p>
</div>

<svg class="wave" viewBox="0 0 1440 60" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <path d="M0,30 C360,60 1080,0 1440,30 L1440,60 L0,60 Z" fill="#FFF8F0"/>
</svg>

<main>
  <p class="lead t"
     data-en="YeastiBoi is a sourdough starter timer app for Android. This policy explains what information the app handles and how your privacy is protected. In short: the app works entirely on your device, and nothing is shared unless you choose to turn on data sharing."
     data-fi="YeastiBoi on Android-sovellus hapanjuuren ajastamiseen. Tämä seloste kertoo, mitä tietoja sovellus käsittelee ja miten yksityisyytesi on suojattu. Lyhyesti: sovellus toimii kokonaan laitteellasi, eikä mitään jaeta ellet itse ota tietojen jakamista käyttöön."></p>

  <h2 class="t" data-en="Data stored on your device" data-fi="Laitteellesi tallennettavat tiedot"></h2>
  <p class="t"
     data-en="Your starter profile, your starter activation history (used to calibrate predictions for your starter), and your app settings are stored only on your device. This information is never sent anywhere and is removed if you uninstall the app."
     data-fi="Juuriprofiilisi, juuren aktivointihistoriasi (jota käytetään ennusteiden kalibrointiin juurellesi) ja sovelluksen asetukset tallennetaan vain laitteellesi. Näitä tietoja ei lähetetä mihinkään, ja ne poistuvat, jos poistat sovelluksen."></p>

  <h2 class="t" data-en="Optional data sharing" data-fi="Vapaaehtoinen tietojen jakaminen"></h2>
  <p class="t"
     data-en="The app includes a 'Share bake data' setting, which is turned OFF by default. If you choose to turn it on, the app sends anonymous fermentation data from your completed bakes to help improve the prediction model for everyone."
     data-fi="Sovelluksessa on 'Jaa leivontatiedot' -asetus, joka on oletuksena POIS päältä. Jos otat sen käyttöön, sovellus lähettää nimettömiä käymistietoja valmistuneista leivonnoistasi parantaakseen ennustemallia kaikille käyttäjille."></p>
  <p class="t" data-en="What is shared:" data-fi="Mitä jaetaan:"></p>
  <ul>
    <li class="t" data-en="Room temperature, feeding ratio, flour type, and starter condition" data-fi="Huoneen lämpötila, ruokintasuhde, jauhotyyppi ja juuren kunto"></li>
    <li class="t" data-en="The predicted and actual peak times, and the app's calibration values" data-fi="Ennustettu ja toteutunut huippuaika sekä sovelluksen kalibrointiarvot"></li>
    <li class="t" data-en="The app version and the date (day only, no exact time)" data-fi="Sovelluksen versio ja päivämäärä (vain päivä, ei kellonaikaa)"></li>
    <li class="t" data-en="A random ID created for your app installation" data-fi="Satunnainen tunniste, joka luodaan sovellusasennuksellesi"></li>
  </ul>
  <p class="t" data-en="What is NOT shared:" data-fi="Mitä EI jaeta:"></p>
  <ul>
    <li class="t" data-en="No name, email address, phone number, location, or contacts" data-fi="Ei nimeä, sähköpostiosoitetta, puhelinnumeroa, sijaintia tai yhteystietoja"></li>
    <li class="t" data-en="Nothing that identifies you as a person — the random installation ID is not linked to your identity and cannot be used to find out who you are" data-fi="Mitään, mikä tunnistaisi sinut henkilönä — satunnainen asennustunniste ei ole sidottu henkilöllisyyteesi, eikä sen avulla voi selvittää, kuka olet"></li>
  </ul>
  <p class="t"
     data-en="You can turn data sharing off at any time in Settings. Turning it off stops all future sharing. Because the shared data is anonymous, it cannot be traced back to you, and individual entries cannot be located or deleted afterwards."
     data-fi="Voit kytkeä tietojen jakamisen pois päältä milloin tahansa Asetuksista. Pois kytkeminen lopettaa kaiken jakamisen jatkossa. Koska jaetut tiedot ovat nimettömiä, niitä ei voi yhdistää sinuun, eikä yksittäisiä merkintöjä voi jälkikäteen löytää tai poistaa."></p>

  <h2 class="t" data-en="How shared data is used" data-fi="Miten jaettuja tietoja käytetään"></h2>
  <p class="t"
     data-en="Shared bake data is combined with data from other users and used only to improve YeastiBoi's fermentation predictions. It is never sold, and it is never used for advertising or tracking."
     data-fi="Jaetut leivontatiedot yhdistetään muiden käyttäjien tietoihin ja käytetään ainoastaan YeastiBoin käymisennusteiden parantamiseen. Tietoja ei koskaan myydä eikä käytetä mainontaan tai seurantaan."></p>

  <h2 class="t" data-en="Where the data is stored" data-fi="Missä tiedot säilytetään"></h2>
  <p class="t"
     data-en="When data sharing is enabled, the anonymous data is stored using Google Firebase (Cloud Firestore and anonymous authentication), on servers located in the European Union. Google processes this data on our behalf."
     data-fi="Kun tietojen jakaminen on käytössä, nimettömät tiedot tallennetaan Google Firebase -palveluun (Cloud Firestore ja nimetön tunnistautuminen) Euroopan unionissa sijaitseville palvelimille. Google käsittelee näitä tietoja puolestamme."></p>
  <p><a href="https://policies.google.com/privacy" target="_blank" rel="noopener">Google Privacy Policy · Googlen tietosuojakäytäntö</a></p>

  <h2 class="t" data-en="Permissions" data-fi="Käyttöoikeudet"></h2>
  <p class="t"
     data-en="The app uses internet access only for the optional data sharing described above, and notification access to alert you when your starter is ready."
     data-fi="Sovellus käyttää internet-yhteyttä vain yllä kuvattuun vapaaehtoiseen tietojen jakamiseen ja ilmoitusoikeutta kertoakseen, kun juuresi on valmis."></p>

  <h2 class="t" data-en="Children" data-fi="Lapset"></h2>
  <p class="t"
     data-en="YeastiBoi is not directed at children and does not knowingly collect data from children."
     data-fi="YeastiBoi ei ole suunnattu lapsille, eikä se tietoisesti kerää tietoja lapsilta."></p>

  <h2 class="t" data-en="Your rights" data-fi="Oikeutesi"></h2>
  <p class="t"
     data-en="Data sharing is based on your consent, which you give by turning the setting on and can withdraw at any time by turning it off. Because the shared data is anonymous and contains no personal information, we are unable to identify, retrieve, or delete the records of any individual user."
     data-fi="Tietojen jakaminen perustuu suostumukseesi, jonka annat ottamalla asetuksen käyttöön ja voit perua milloin tahansa kytkemällä sen pois. Koska jaetut tiedot ovat nimettömiä eivätkä sisällä henkilötietoja, emme pysty tunnistamaan, hakemaan tai poistamaan yksittäisen käyttäjän tietoja."></p>

  <h2 class="t" data-en="Changes to this policy" data-fi="Muutokset tähän selosteeseen"></h2>
  <p class="t"
     data-en="If this policy changes, the updated version will be posted on this page with a new date."
     data-fi="Jos tämä seloste muuttuu, päivitetty versio julkaistaan tällä sivulla uudella päivämäärällä."></p>

  <h2 class="t" data-en="Contact" data-fi="Yhteystiedot"></h2>
  <p class="t" data-en="Questions about this policy? Contact:" data-fi="Kysyttävää selosteesta? Ota yhteyttä:"></p>
  <p><a href="mailto:7omikiljunen@gmail.com">7omikiljunen@gmail.com</a></p>
</main>

<footer>
  <p><a href="index.html" class="t" data-en="← Back to YeastiBoi" data-fi="← Takaisin YeastiBoihin"></a></p>
  <p><a href="mailto:7omikiljunen@gmail.com">7omikiljunen@gmail.com</a></p>
</footer>

<script>
  function setLang(lang) {
    document.querySelectorAll('.t').forEach(el => {
      const val = el.dataset[lang];
      if (val) el.textContent = val;
    });
    document.querySelectorAll('.lang-bar button').forEach(b => b.classList.remove('active'));
    document.querySelector(`.lang-bar button[onclick="setLang('${lang}')"]`).classList.add('active');
    document.documentElement.lang = lang;
  }
  setLang('en');
</script>
</body>
</html>
